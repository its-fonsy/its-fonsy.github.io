---
layout: default
title: Home
---
<div class="post-list">
	<h1 class="post-list-title">Post</h1>
	<ul class="post-list-list">
		{% for post in site.posts %}
		<li>
			<b><a href="{{ post.url }}">{{ post.title }}</a></b>
			<i>{{  post.date | date_to_string  }}</i>
		</li>
		{% endfor %}
	</ul>
</div>
